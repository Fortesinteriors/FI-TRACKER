  // Mobile bottom nav
  const mob = document.getElementById("bnavInner");
  NAV_ITEMS.forEach(r=>{
    const btn=document.createElement("button");
    btn.className="bnav-btn"+(r.id===role?" active":"");
    btn.innerHTML=`<span class="bnav-icon">${r.icon}</span><span>${r.label}</span><span class="bnav-dot"></span>`;
    btn.addEventListener("click",()=>setRole(r.id));
    btn.dataset.role=r.id;
    mob.appendChild(btn);
  });
}

function setRole(r){
  role=r;
  // Update desktop
  document.querySelectorAll(".role-btn-d").forEach((b,i)=>{
    b.style.cssText=NAV_ITEMS[i].id===r?S.rA:S.rB;
  });
  // Update mobile
  document.querySelectorAll(".bnav-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.role===r);
  });
  // Scroll to top
  document.querySelector(".scroll-area").scrollTop=0;
  render();
}

function buildBrandTabs(){
  const w=document.createElement("div"); w.className="brand-tabs";
  BRANDS.forEach(b=>{
    const btn=document.createElement("button"); btn.textContent=b.name;
    btn.style.cssText=b.id===activeBrand?S.bA:S.bB;
    btn.addEventListener("click",()=>{
      activeBrand=b.id;
      w.querySelectorAll("button").forEach(x=>x.style.cssText=S.bB);
      btn.style.cssText=S.bA;
      activeObra=obrasFor(b.id)[0]?.code||"";
      render();
    });
    w.appendChild(btn);
  }); return w;
}

function buildObraTabs(){
  const obras=obrasFor(activeBrand);
  const w=document.createElement("div"); w.className="obra-tabs";
  obras.forEach(o=>{
    const isA=o.code===activeObra;
    const btn=document.createElement("button"); btn.style.cssText=isA?S.oA:S.oB;
    btn.innerHTML=`<span style="display:block;font-size:13px;font-weight:600;color:${isA?'#fff':'#222'};">${o.site}</span><span style="display:block;font-size:10px;font-family:monospace;color:${isA?'rgba(255,255,255,0.6)':'#999'};margin-top:2px;">${o.code}</span>`;
    btn.addEventListener("click",()=>{
      activeObra=o.code;
      w.querySelectorAll("button").forEach(x=>{
        x.style.cssText=S.oB;
        x.querySelectorAll("span")[0].style.color="#222";
        x.querySelectorAll("span")[1].style.color="#999";
      });
      btn.style.cssText=S.oA;
      btn.querySelectorAll("span")[0].style.color="#fff";
      btn.querySelectorAll("span")[1].style.color="rgba(255,255,255,0.6)";
      render();
    });
    w.appendChild(btn);
  }); return w;
}

function obrasFor(b){return DB.obras.filter(o=>o.brand===b);}
function obraInfo(c){return DB.obras.find(o=>o.code===c);}
function today(){return new Date().toISOString().split('T')[0];}

function si(o){
  if(o.dest==="warehouse") return {pending:{cls:"bp",l:"Pending"},warehouse:{cls:"bwh",l:"At Warehouse"},sent:{cls:"bst",l:"Dispatched"},received:{cls:"bdn",l:"Received"},issue:{cls:"bi",l:"Issue"}}[o.status]||{cls:"bp",l:o.status};
  return {pending:{cls:"bp",l:"Pending"},received:{cls:"br",l:"Received"},issue:{cls:"bi",l:"Issue"},partial:{cls:"bpa",l:"Partial"}}[o.status]||{cls:"bp",l:o.status};
}
function badge(o){const s=si(o);return `<span class="badge ${s.cls}">${s.l}</span>`;}
function destB(d){return d==="warehouse"?`<span class="db dw">🏭 Via Warehouse</span>`:`<span class="db do">📦 Direct to Site</span>`;}

function esSel(o){
  const iw=o.dest==="warehouse";
  const opts=iw?["pending","warehouse","sent","received","issue"]:["pending","received","partial","issue"];
  const lbls={pending:"Pending",received:"Received",partial:"Partial",issue:"Issue",warehouse:"At Warehouse",sent:"Dispatched"};
  return `<select class="sel-c" onchange="updS('${o.uid}',this.value)">${opts.map(s=>`<option value="${s}"${o.status===s?" selected":""}>${lbls[s]}</option>`).join('')}</select>`;
}
function ecSel(o){
  return `<select class="sel-c" onchange="updC('${o.uid}',this.value)">
    <option value=""${!o.condition?" selected":""}>—</option>
    <option value="good"${o.condition==="good"?" selected":""}>Good</option>
    <option value="damaged"${o.condition==="damaged"?" selected":""}>Damaged</option>
    <option value="missing"${o.condition==="missing"?" selected":""}>Missing</option>
  </select>`;
}
function updS(uid,val){const o=DB.orders.find(x=>x.uid===uid);if(!o)return;o.status=val;if(val==="received"&&!o.received)o.received=today();if(val==="warehouse"&&!o.whReceived)o.whReceived=today();if(val==="sent"&&!o.whSent)o.whSent=today();render();}
function updC(uid,val){const o=DB.orders.find(x=>x.uid===uid);if(o){o.condition=val;render();}}

function statsH(orders){
  const t=orders.length,p=orders.filter(o=>o.status==="pending").length,r=orders.filter(o=>o.status==="received").length,i=orders.filter(o=>o.status==="issue"||o.status==="partial").length;
  return `<div class="stats-row"><div class="stat t"><div class="stat-label">Total</div><div class="stat-val ny">${t}</div></div><div class="stat p"><div class="stat-label">Pending</div><div class="stat-val wn">${p}</div></div><div class="stat r"><div class="stat-label">Received</div><div class="stat-val ok">${r}</div></div><div class="stat i"><div class="stat-label">Issues</div><div class="stat-val er">${i}</div></div></div>`;
}

function render(){
  const m=document.getElementById("main"); m.innerHTML="";
  if(role==="office") rOffice(m);
  else if(role==="site") rSite(m);
  else if(role==="warehouse") rWh(m);
  else rObras(m);
}

// ── OFFICE ────────────────────────────────────────────────────────────────────
function rOffice(m){
  m.insertAdjacentHTML("beforeend",`<div class="sec">Brand</div>`);
  m.appendChild(buildBrandTabs());
  const ab=DB.orders.filter(o=>obraInfo(o.obra)?.brand===activeBrand);
  m.insertAdjacentHTML("beforeend",statsH(ab));
  m.insertAdjacentHTML("beforeend",`<div class="sec">Site</div>`);
  m.appendChild(buildObraTabs());
  const oo=DB.orders.filter(o=>o.obra===activeObra);
  const inf=obraInfo(activeObra);
  m.insertAdjacentHTML("beforeend",`<div class="top-row"><div style="font-size:13px;"><strong style="color:#1C3F5E">${inf?.site||''}</strong><span class="pill" style="margin-left:8px">${activeObra}</span><span style="color:#aaa;margin-left:8px;font-size:12px">${oo.length} order${oo.length!==1?'s':''}</span></div><div style="display:flex;gap:8px;"><button class="btn" onclick="showUpload()">📂 Import</button><button class="btn btn-navy" onclick="showAdd()">+ New</button></div></div>`);
  const wrap=document.createElement("div"); wrap.className="tbl-wrap";
  wrap.innerHTML=`<table class="tbl"><colgroup><col style="width:80px"><col style="width:90px"><col style="width:100px"><col><col style="width:80px"><col style="width:85px"><col style="width:65px"><col style="width:80px"></colgroup>
  <thead><tr><th>Order No.</th><th>Delivery</th><th>Supplier</th><th>Product</th><th>Est. Del.</th><th>Status</th><th>Condition</th><th>Notes</th></tr></thead>
  <tbody>${oo.length===0?`<tr><td colspan="8" style="text-align:center;padding:28px;color:#aaa;">No orders for this site</td></tr>`:oo.map(o=>`<tr><td class="nw" style="font-weight:600;color:#1C3F5E;">${o.id}</td><td class="nw">${destB(o.dest)}</td><td class="nw" style="color:#555;">${o.supplier}</td><td class="wr">${o.product}</td><td class="nw" style="color:#555;">${o.eta}</td><td class="nw">${esSel(o)}</td><td class="nw">${ecSel(o)}</td><td class="nw" style="font-size:11px;color:#999;">${o.notes||'—'}</td></tr>`).join('')}</tbody></table>`;
  m.appendChild(wrap);
}

// ── SITE VIEW ─────────────────────────────────────────────────────────────────
function rSite(m){
  m.insertAdjacentHTML("beforeend",`<div class="sec">Brand</div>`);
  m.appendChild(buildBrandTabs());
  m.insertAdjacentHTML("beforeend",`<div class="sec">Site</div>`);
  m.appendChild(buildObraTabs());
  const inf=obraInfo(activeObra);
  const pend=DB.orders.filter(o=>o.obra===activeObra&&((o.dest==="site"&&(o.status==="pending"||o.status==="partial"))||(o.dest==="warehouse"&&o.status==="sent")));
  const done=DB.orders.filter(o=>o.obra===activeObra&&(o.status==="received"||o.status==="issue"));
  m.insertAdjacentHTML("beforeend",`<div style="margin-bottom:14px;padding:12px 14px;background:#fff;border-radius:10px;border:1px solid #E8ECF0;"><strong style="color:#1C3F5E;font-size:15px">${inf?.site||''}</strong><br><span class="pill" style="margin-top:4px;display:inline-block">${activeObra}</span></div>`);
  m.insertAdjacentHTML("beforeend",`<div class="sec">Awaiting Receipt (${pend.length})</div>`);
  if(!pend.length){m.insertAdjacentHTML("beforeend",`<div class="empty">✅ No pending deliveries for this site</div>`);}
  else pend.forEach(o=>{
    const fw=o.dest==="warehouse";
    m.insertAdjacentHTML("beforeend",`<div class="card ${fw?'wc':'scc'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div style="flex:1;min-width:0;padding-right:8px;"><div class="ct">${o.product}</div><div class="cm">${o.id} · ${o.supplier}<br>Est: ${o.eta}${fw?` · <strong style="color:#6D28D9">From warehouse</strong>`:''}</div></div>
        ${badge(o)}
      </div>
      <div class="ca">
        <div class="cg"><input type="checkbox" id="ck-${o.uid}" onchange="tmp('${o.uid}','complete',this.checked)"><label for="ck-${o.uid}" style="font-size:14px">Delivery complete</label></div>
        <select class="sel-std" onchange="tmp('${o.uid}','condition',this.value)"><option value="">Material condition…</option><option value="good">Good condition</option><option value="damaged">Damaged</option><option value="missing">Missing items</option></select>
        <input type="text" class="text-in" placeholder="Notes..." onchange="tmp('${o.uid}','notes',this.value)">
        <button class="btn btn-navy" onclick="confSite('${o.uid}')">✅ Confirm Receipt</button>
      </div>
    </div>`);
  });
  if(done.length){
    m.insertAdjacentHTML("beforeend",`<div class="sec" style="margin-top:16px">Confirmed — Editable (${done.length})</div>`);
    done.forEach(o=>{m.insertAdjacentHTML("beforeend",`<div class="card done">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div style="flex:1;min-width:0;padding-right:8px;"><div class="ct">${o.product}</div><div class="cm">${o.id} · ${o.supplier} · Received: ${o.received||'—'}</div></div>
        ${badge(o)}
      </div>
      <div class="ca">
        <div class="cg"><label style="font-size:12px">Status:</label>${esSel(o)}</div>
        <div class="cg"><label style="font-size:12px">Condition:</label>${ecSel(o)}</div>
        <button class="btn btn-sm" onclick="editN('${o.uid}')" style="margin-left:auto">✏️ Notes</button>
      </div>
      ${o.notes?`<div style="font-size:12px;color:#aaa;margin-top:6px;padding-top:6px;border-top:1px solid #f0f0f0">${o.notes}</div>`:''}
    </div>`);});
  }
}

// ── WAREHOUSE ─────────────────────────────────────────────────────────────────
function rWh(m){
  const wh=DB.orders.filter(o=>o.dest==="warehouse");
  const pend=wh.filter(o=>o.status==="pending");
  const inWh=wh.filter(o=>o.status==="warehouse");
  const sent=wh.filter(o=>o.status==="sent");
  const done=wh.filter(o=>o.status==="received"||o.status==="issue");
  m.insertAdjacentHTML("beforeend",`<div class="wb"><strong>Warehouse View</strong> — all orders routed via the company warehouse.</div>`);
  function whCard(o,actions){const inf=obraInfo(o.obra);return `<div class="card wc"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;"><div style="flex:1;min-width:0;padding-right:8px;"><div class="ct">${o.product}</div><div class="cm">${o.id} · ${o.supplier}<br><strong style="color:#1C3F5E">${inf?.site||o.obra}</strong> <span class="pill">${o.obra}</span><br>Est: ${o.eta}</div></div>${badge(o)}</div>${actions}</div>`;}
  m.insertAdjacentHTML("beforeend",`<div class="sec">⏳ Awaiting Arrival (${pend.length})</div>`);
  if(!pend.length) m.insertAdjacentHTML("beforeend",`<div class="empty">Nothing awaiting arrival</div>`);
  pend.forEach(o=>m.insertAdjacentHTML("beforeend",whCard(o,`<div class="ca"><input type="text" class="text-in" placeholder="Notes..." onchange="tmp('${o.uid}','notes',this.value)"><button class="btn btn-purple" onclick="confWh('${o.uid}')">Confirm Arrival</button></div>`)));
  m.insertAdjacentHTML("beforeend",`<div class="sec" style="margin-top:16px">📦 In Warehouse (${inWh.length})</div>`);
  if(!inWh.length) m.insertAdjacentHTML("beforeend",`<div class="empty">Nothing awaiting dispatch</div>`);
  inWh.forEach(o=>m.insertAdjacentHTML("beforeend",whCard(o,`<div class="ca"><span style="font-size:12px;color:#888">Arrived: ${o.whReceived}</span><input type="text" class="text-in" placeholder="Dispatch notes..." onchange="tmp('${o.uid}','notes',this.value)"><button class="btn btn-teal" onclick="sendS('${o.uid}')">Dispatch to Site →</button></div>`)));
  m.insertAdjacentHTML("beforeend",`<div class="sec" style="margin-top:16px">🚚 Dispatched — Awaiting Confirmation (${sent.length})</div>`);
  if(!sent.length) m.insertAdjacentHTML("beforeend",`<div class="empty">Nothing awaiting confirmation</div>`);
  sent.forEach(o=>m.insertAdjacentHTML("beforeend",whCard(o,`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #F0F0F0;font-size:12px;color:#888">Arrived: ${o.whReceived} · Dispatched: ${o.whSent} · Awaiting site confirmation</div>`)));
  if(done.length){
    m.insertAdjacentHTML("beforeend",`<div class="sec" style="margin-top:16px">✅ Completed — Editable (${done.length})</div>`);
    done.forEach(o=>m.insertAdjacentHTML("beforeend",whCard(o,`<div class="ca"><div class="cg"><label style="font-size:12px">Status:</label>${esSel(o)}</div><div class="cg"><label style="font-size:12px">Condition:</label>${ecSel(o)}</div></div>`)));
  }
}

// ── SITE MANAGEMENT ───────────────────────────────────────────────────────────
function rObras(m){
  const tabs=document.createElement("div"); tabs.className="subview-tabs";
  [{id:"list",label:"📋 Registered Sites"},{id:"new",label:"➕ New Site"}].forEach(t=>{
    const btn=document.createElement("button"); btn.textContent=t.label;
    btn.className="sv-tab"+(t.id===obrasView?" act":"");
    btn.addEventListener("click",()=>{obrasView=t.id;render();});
    tabs.appendChild(btn);
  }); m.appendChild(tabs);
  if(obrasView==="list") rObrasList(m); else rObrasNew(m);
}
function rObrasList(m){
  const total=DB.obras.length,active=DB.obras.filter(o=>o.status==="active"||!o.status).length,planned=DB.obras.filter(o=>o.status==="planned").length,closed=DB.obras.filter(o=>o.status==="closed").length;
  m.insertAdjacentHTML("beforeend",`<div class="stats-row" style="margin-bottom:16px;"><div class="stat t"><div class="stat-label">Total</div><div class="stat-val ny">${total}</div></div><div class="stat r"><div class="stat-label">Active</div><div class="stat-val ok">${active}</div></div><div class="stat p"><div class="stat-label">Planned</div><div class="stat-val wn">${planned}</div></div><div class="stat i"><div class="stat-label">Closed</div><div class="stat-val" style="color:#6B7280">${closed}</div></div></div>`);
  if(!DB.obras.length){m.insertAdjacentHTML("beforeend",`<div class="empty">No sites registered yet. Use "New Site" to add one.</div>`);return;}
  BRANDS.forEach(brand=>{
    const bo=DB.obras.filter(o=>o.brand===brand.id); if(!bo.length)return;
    m.insertAdjacentHTML("beforeend",`<div class="sec">${brand.name} (${bo.length})</div>`);
    const grid=document.createElement("div"); grid.className="obras-grid";
    bo.forEach(o=>{
      const orders=DB.orders.filter(p=>p.obra===o.code),pend=orders.filter(p=>p.status==="pending").length;
      const stL={active:"Active",planned:"Planned",closed:"Closed"}[o.status||"active"];
      const stC={active:"sp-active",planned:"sp-planned",closed:"sp-closed"}[o.status||"active"];
      const card=document.createElement("div"); card.className="obra-card-g";
      card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><div class="og-code">${o.code}</div><div class="og-site">${o.site}</div></div><span class="status-pill ${stC}">${stL}</span></div><div class="og-meta">${orders.length} order${orders.length!==1?'s':''}${pend>0?` · <strong style="color:#D97706">${pend} pending</strong>`:''}</div><div class="og-actions"><select class="sel-std" onchange="changeObraStatus('${o.code}',this.value)" style="flex:1;font-size:12px;padding:6px 8px;"><option value="active" ${(o.status||"active")==="active"?"selected":""}>Active</option><option value="planned" ${(o.status||"")==="planned"?"selected":""}>Planned</option><option value="closed" ${(o.status||"")==="closed"?"selected":""}>Closed</option></select><button class="btn btn-danger btn-sm" onclick="deleteObra('${o.code}')">🗑️ Delete</button></div>`;
      grid.appendChild(card);
    }); m.appendChild(grid);
  });
}
function rObrasNew(m){
  const year=new Date().getFullYear().toString().slice(-2);
  const bOpts=BRANDS.map(b=>`<option value="${b.id}">${b.name} (${b.id})</option>`).join('');
  m.insertAdjacentHTML("beforeend",`<div><div class="ib" style="margin-bottom:16px;"><strong>Code format:</strong> FI.[BRAND].[YY].[NN]<br>Example: <strong>FI.ZAR.${year}.01</strong> = ZARA · 20${year} · Site 01</div>
  <div class="fg"><label class="fl">Brand</label><select class="fi" id="nob-brand" onchange="updObraCode()">${bOpts}</select></div>
  <div class="fg"><label class="fl">Site Name / Location</label><input class="fi" id="nob-site" placeholder="e.g. Oxford Street, London" oninput="updObraCode()"></div>
  <div class="fg"><label class="fl">Site Number</label><input class="fi" id="nob-num" type="number" min="1" max="99" value="1" oninput="updObraCode()"></div>
  <div class="fg"><label class="fl">Status</label><select class="fi" id="nob-status"><option value="active">Active</option><option value="planned">Planned</option></select></div>
  <div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:14px;margin-bottom:16px;"><div style="font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Generated Code</div><div id="nob-preview" style="font-family:monospace;font-size:20px;font-weight:700;color:#1C3F5E;">FI.ZAR.${year}.01</div></div>
  <div style="display:flex;gap:10px;"><button class="btn" style="flex:1" onclick="obrasView='list';render()">Cancel</button><button class="btn btn-navy" style="flex:1" onclick="saveNewObra()">Register Site</button></div></div>`);
}
function updObraCode(){
  const b=document.getElementById("nob-brand")?.value||"ZAR";
  const n=String(document.getElementById("nob-num")?.value||1).padStart(2,"0");
  const y=new Date().getFullYear().toString().slice(-2);
  const p=document.getElementById("nob-preview");
  if(p)p.textContent=`FI.${b}.${y}.${n}`;
}
function saveNewObra(){
  const brand=document.getElementById("nob-brand").value;
  const site=document.getElementById("nob-site").value.trim();
  const num=String(document.getElementById("nob-num").value||1).padStart(2,"0");
  const status=document.getElementById("nob-status").value;
  const year=new Date().getFullYear().toString().slice(-2);
  const code=`FI.${brand}.${year}.${num}`;
  if(!site){alert("Please enter a site name");return;}
  if(DB.obras.find(o=>o.code===code)){alert(`Code ${code} already exists`);return;}
  DB.obras.push({code,brand,site,status}); obrasView="list"; render();
}
function changeObraStatus(code,status){const o=DB.obras.find(x=>x.code===code);if(o){o.status=status;render();}}
function deleteObra(code){
  const o=DB.obras.find(x=>x.code===code);
  const n=DB.orders.filter(p=>p.obra===code).length;
  if(!confirm(`Delete site ${code} — ${o?.site}?${n>0?`\n\n⚠️ ${n} order${n!==1?'s':''} will also be deleted.`:''}`))return;
  DB.obras=DB.obras.filter(x=>x.code!==code);
  DB.orders=DB.orders.filter(x=>x.obra!==code);
  if(activeObra===code){const r=obrasFor(activeBrand);activeObra=r.length?r[0].code:"";}
  render();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
const T={};
function tmp(uid,f,v){if(!T[uid])T[uid]={};T[uid][f]=v;}
function confSite(uid){
  const o=DB.orders.find(x=>x.uid===uid);if(!o)return;const u=T[uid]||{};
  o.received=today();o.complete=u.complete||false;o.condition=u.condition||"good";if(u.notes)o.notes=u.notes;
  o.status=(!o.complete||o.condition==="damaged"||o.condition==="missing")?(o.condition==="damaged"?"issue":"partial"):"received";
  delete T[uid];render();
}
function confWh(uid){const o=DB.orders.find(x=>x.uid===uid);if(!o)return;const u=T[uid]||{};o.whReceived=today();o.status="warehouse";if(u.notes)o.notes=u.notes;delete T[uid];render();}
function sendS(uid){const o=DB.orders.find(x=>x.uid===uid);if(!o)return;const u=T[uid]||{};o.whSent=today();o.status="sent";if(u.notes)o.notes=u.notes;delete T[uid];render();}
function editN(uid){const o=DB.orders.find(x=>x.uid===uid);if(!o)return;const n=prompt("Edit notes:",o.notes||"");if(n!==null){o.notes=n;render();}}

// ── IMPORT ────────────────────────────────────────────────────────────────────
function showUpload(){
  document.getElementById("modal").innerHTML=`
    <div class="modal-bg" onclick="closeM(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">📂 Import Excel File</div>
        <div class="ib">One file per import. The app reads the <strong>Site Code</strong> column to assign orders. Existing orders are preserved.</div>
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this.files[0])">
          <div style="font-size:40px;margin-bottom:10px">📂</div>
          <div style="font-size:15px;font-weight:600;margin-bottom:4px">Tap to browse or drag file here</div>
          <div style="font-size:12px;color:#aaa">.xlsx · .xls · .csv</div>
        </div>
        <div id="importResult"></div>
        <div class="ma"><button class="btn" onclick="closeM()" style="flex:1;padding:14px">Close</button></div>
      </div>
    </div>`;
  setTimeout(()=>{
    const zone=document.getElementById("dropZone");if(!zone)return;
    zone.addEventListener("dragover",e=>{e.preventDefault();zone.style.background="#EFF6FF";});
    zone.addEventListener("dragleave",()=>{zone.style.background="";});
    zone.addEventListener("drop",e=>{e.preventDefault();zone.style.background="";const f=e.dataTransfer.files[0];if(f)handleFile(f);});
  },100);
}

function handleFile(file){
  if(!file)return;
  const d=document.getElementById("importResult");
  if(d)d.innerHTML=`<div style="text-align:center;padding:16px;color:#888">Reading file…</div>`;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:"array",cellDates:true});
      const sheet=wb.Sheets[wb.SheetNames[0]];
      const range=XLSX.utils.decode_range(sheet["!ref"]||"A1:Z100");
      let headerRow=0;
      for(let r=range.s.r;r<=Math.min(range.e.r,10);r++){
        for(let c=range.s.c;c<=range.e.c;c++){
          const cell=sheet[XLSX.utils.encode_cell({r,c})];
          if(cell&&cell.v){const v=String(cell.v).toUpperCase();if(v.includes("ORDER")||v.includes("SITE CODE")||v.includes("SUPPLIER")){headerRow=r;break;}}
        }if(headerRow)break;
      }
      const rows=XLSX.utils.sheet_to_json(sheet,{defval:"",header:1,range:headerRow});
      if(rows.length<2){showImportResult([],[],["File appears to be empty."]);return;}
      const headers=rows[0].map(h=>String(h||"").trim().toUpperCase());
      let dataStartIdx=1;
      if(rows[1]){const fv=String(rows[1][0]||"").toLowerCase();if(fv.includes("e.g")||fv.includes("example")||fv==="")dataStartIdx=2;}
      const idx={};
      headers.forEach((h,i)=>{
        const n=h.replace(/[^A-Z0-9]/g,"");
        if(n.includes("ORDER")||n.includes("PEDIDO"))idx.id=i;
        else if(n.includes("SITECODE")||n.includes("OBRA")||h==="SITE CODE")idx.obra=i;
        else if(n.includes("SUPPLIER")||n.includes("PROVEEDOR"))idx.supplier=i;
        else if(n.includes("PRODUCT")||n.includes("MATERIAL")||n.includes("DESCRIPTION"))idx.product=i;
        else if((n.includes("EST")&&n.includes("DELIVERY"))||(n.includes("DELIVERY")&&n.includes("DATE"))||n.includes("FECHA"))idx.eta=i;
        else if(n.includes("ROUTE")||n.includes("DESTINO")||n.includes("DEST"))idx.dest=i;
      });
      const missing=[];
      if(idx.id===undefined)missing.push("ORDER NO.");if(idx.obra===undefined)missing.push("SITE CODE");
      if(idx.supplier===undefined)missing.push("SUPPLIER");if(idx.product===undefined)missing.push("PRODUCT");
      if(idx.eta===undefined)missing.push("EST. DELIVERY DATE");
      if(missing.length){showImportResult([],[],[`Columns not found: ${missing.join(", ")}. Found: ${headers.filter(h=>h).join(", ")}`]);return;}
      const added=[],skipped=[],errors=[];
      rows.slice(dataStartIdx).forEach((row,i)=>{
        const rn=dataStartIdx+i+headerRow+2;
        const id=String(row[idx.id]||"").trim();
        const obraCode=String(row[idx.obra]||"").trim();
        const supplier=String(row[idx.supplier]||"").trim();
        const product=String(row[idx.product]||"").trim();
        const destRaw=String(row[idx.dest]||"").trim().toLowerCase();
        let eta="";
        const rawEta=row[idx.eta];
        if(rawEta instanceof Date)eta=rawEta.toISOString().split("T")[0];
        else if(typeof rawEta==="number"){const d=XLSX.SSF.parse_date_code(rawEta);if(d)eta=`${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;}
        else if(rawEta){const p=new Date(rawEta);eta=isNaN(p)?String(rawEta).trim():p.toISOString().split("T")[0];}
        if(!id&&!obraCode&&!supplier&&!product)return;
        if(!id){errors.push(`Row ${rn}: missing Order No.`);return;}
        if(!obraCode){errors.push(`Row ${rn} (${id}): missing Site Code`);return;}
        if(!supplier){errors.push(`Row ${rn} (${id}): missing Supplier`);return;}
        if(!product){errors.push(`Row ${rn} (${id}): missing Product`);return;}
        if(!eta){errors.push(`Row ${rn} (${id}): missing Delivery Date`);return;}
        if(DB.orders.find(x=>x.id===id&&x.obra===obraCode)){skipped.push(`${obraCode}/${id}`);return;}
        if(!DB.obras.find(o=>o.code===obraCode)){const parts=obraCode.split(".");const brand=parts.length>=2?parts[1]:"ZAR";DB.obras.push({code:obraCode,brand,site:obraCode,status:"active"});}
        const dest=(destRaw.includes("warehouse")||destRaw.includes("almacen"))?"warehouse":"site";
        DB.orders.push({uid:`${obraCode}::${id}`,id,obra:obraCode,supplier,product,eta,dest,status:"pending",whReceived:null,whSent:null,received:null,complete:null,condition:null,notes:""});
        added.push(`${obraCode}/${id}`);
      });
      showImportResult(added,skipped,errors);
      if(added.length){const[ao]=added[0].split("/");const inf=DB.obras.find(x=>x.code===ao.trim());if(inf){activeBrand=inf.brand;activeObra=inf.code;}render();}
    }catch(err){const d=document.getElementById("importResult");if(d)d.innerHTML=`<div style="background:#FEE2E2;color:#991B1B;border-radius:8px;padding:12px;margin-top:8px">Error: ${err.message}</div>`;}
  };
  reader.readAsArrayBuffer(file);
}

function showImportResult(added,skipped,errors){
  const d=document.getElementById("importResult");if(!d)return;
  let html="";
  if(added.length)html+=`<div style="background:#D1FAE5;color:#065F46;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px">✅ <strong>${added.length}</strong> new order${added.length!==1?'s':''} imported</div>`;
  if(skipped.length)html+=`<div style="background:#FEF3C7;color:#92400E;border-radius:8px;padding:10px 14px;margin-top:6px;font-size:13px">⏭️ <strong>${skipped.length}</strong> already existed (preserved)</div>`;
  if(errors.length)html+=`<div style="background:#FEE2E2;color:#991B1B;border-radius:8px;padding:10px 14px;margin-top:6px;font-size:12px">⚠️ <strong>${errors.length}</strong> row${errors.length!==1?'s':''} skipped:<br>${errors.slice(0,5).map(e=>`· ${e}`).join("<br>")}${errors.length>5?`<br>· … and ${errors.length-5} more`:''}</div>`;
  if(!added.length&&!skipped.length&&!errors.length)html=`<div style="background:#FEF3C7;color:#92400E;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px">No data rows found.</div>`;
  d.innerHTML=html;
}

// ── NEW ORDER MODAL ───────────────────────────────────────────────────────────
function showAdd(){
  const bO=BRANDS.map(b=>`<option value="${b.id}"${b.id===activeBrand?" selected":""}>${b.name}</option>`).join('');
  const oO=obrasFor(activeBrand).map(o=>`<option value="${o.code}"${o.code===activeObra?" selected":""}>${o.site} (${o.code})</option>`).join('');
  document.getElementById("modal").innerHTML=`
    <div class="modal-bg" onclick="closeM(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">New Order</div>
        <div class="fr">
          <div class="fg"><label class="fl">Order No.</label><input class="fi" id="fi" placeholder="PED-001"></div>
          <div class="fg"><label class="fl">Brand</label><select class="fi" id="fb" onchange="rO2()">${bO}</select></div>
        </div>
        <div class="fg"><label class="fl">Site</label><select class="fi" id="fo">${oO}</select></div>
        <div class="fg"><label class="fl">Delivery Route</label>
          <div class="dtog">
            <div class="dopt so" id="dO" onclick="selD('site')">📦 Direct to Site</div>
            <div class="dopt" id="dW" onclick="selD('warehouse')">🏭 Via Warehouse</div>
          </div>
        </div>
        <div class="fg"><label class="fl">Supplier</label><input class="fi" id="fp" placeholder="Supplier name"></div>
        <div class="fg"><label class="fl">Product / Material</label><input class="fi" id="fd" placeholder="Description"></div>
        <div class="fg"><label class="fl">Estimated Delivery Date</label><input type="date" class="fi" id="fe"></div>
        <div class="ma">
          <button class="btn" onclick="closeM()">Cancel</button>
          <button class="btn btn-navy" onclick="saveOrder()">Save Order</button>
        </div>
      </div>
    </div>`;
  window._dest="site";
}
function selD(d){window._dest=d;document.getElementById("dO").className="dopt"+(d==="site"?" so":"");document.getElementById("dW").className="dopt"+(d==="warehouse"?" sw":"");}
function rO2(){const b=document.getElementById("fb").value;document.getElementById("fo").innerHTML=obrasFor(b).map(o=>`<option value="${o.code}">${o.site} (${o.code})</option>`).join('');}
function saveOrder(){
  const obra=document.getElementById("fo").value;
  const id=document.getElementById("fi").value||`PED-${String(DB.orders.filter(x=>x.obra===obra).length+1).padStart(3,'0')}`;
  const uid=`${obra}::${id}`;
  const o={uid,id,obra,supplier:document.getElementById("fp").value,product:document.getElementById("fd").value,eta:document.getElementById("fe").value,dest:window._dest||"site",status:"pending",whReceived:null,whSent:null,received:null,complete:null,condition:null,notes:""};
  if(!o.supplier||!o.product||!o.eta){alert("Please fill in all fields");return;}
  if(DB.orders.find(x=>x.uid===uid)){alert(`Order ${id} already exists for this site`);return;}
  DB.orders.push(o);const ob=obraInfo(o.obra);if(ob){activeBrand=ob.brand;activeObra=o.obra;}closeM();render();
}
function closeM(e){if(e&&e.target!==e.currentTarget)return;document.getElementById("modal").innerHTML="";}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildNav();
render();

// Service Worker for offline use
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='fi-tracker-v1';
    const URLS=['${location.href}','https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS).catch(()=>{}))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('${location.href}')))));
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
